name: Release

on:
  push:
    branches: [main]
    paths:
      - "specs/telegram-bot-api.openapi.json"
  workflow_dispatch:

# This package is self-updating: a daily cron regenerates the spec, auto-merges
# additive changes, and this workflow publishes on that merge. Versioning is
# spec-driven (scripts/compute-version.ts mirrors the Telegram Bot API version),
# so we keep the trigger/version/build steps here rather than switching to
# buildspace's label-driven release workflow. We only reuse buildspace's
# publish + GitHub-release blocks so the publish path matches every other
# photon-hq package.
#
# Publishing uses npm Trusted Publishing (OIDC) + provenance; NPM_TOKEN is an
# optional fallback. One-time setup: register this repo + workflow as a Trusted
# Publisher for `@photon-ai/telegram-ts`.
permissions:
  contents: write # create git tag + GitHub Release
  id-token: write # OIDC token exchange for npm Trusted Publishing

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need full history + tags to diff the spec against the last release.
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      - name: Generate client + build
        run: |
          bun run generate:client
          bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Compute next version
        id: version
        run: bun run compute:version

      - name: Set package version
        if: steps.version.outputs.should_publish == 'true'
        working-directory: packages/telegram-ts
        run: npm pkg set version=${{ steps.version.outputs.version }}

      # buildspace publish-npm: OIDC Trusted Publishing + provenance, NPM_TOKEN
      # fallback, and a post-publish check that the version landed on the
      # registry. Runs its own install + build in the package dir.
      - name: Publish to npm
        if: steps.version.outputs.should_publish == 'true'
        uses: photon-hq/buildspace/.github/blocks/publish-npm@main
        with:
          bun-version: 1.3.5
          working-directory: packages/telegram-ts
          build-command: bun run build
          tag: latest
          npm-token: ${{ secrets.NPM_TOKEN }}

      # buildspace create-github-release: creates the `v<version>` tag + Release
      # at this commit (which compute-version diffs the spec against next run).
      - name: Tag + GitHub Release
        if: steps.version.outputs.should_publish == 'true'
        uses: photon-hq/buildspace/.github/blocks/create-github-release@main
        with:
          version: ${{ steps.version.outputs.version }}
          title: v${{ steps.version.outputs.version }}
          notes: "Telegram Bot API ${{ steps.version.outputs.telegram_version }} — published `@photon-ai/telegram-ts@${{ steps.version.outputs.version }}`."
          tag-prefix: v
